<nav class="navbar">
  <div class="navbar-container">
    <a routerLink="/clients" class="navbar-brand">
      <span class="navbar-logo">FA</span>
      <span class="navbar-title">Financial Advisor</span>
    </a>

    <div class="navbar-actions">
      <div class="theme-toggle" (click)="toggleTheme()">
        <div class="toggle-track" [class.dark]="isDark()">
          <span class="toggle-icon sun">☀️</span>
          <span class="toggle-icon moon">🌙</span>
          <div class="toggle-thumb" [class.dark]="isDark()"></div>
        </div>
      </div>

      @if (currentUrl() !== '/clients') {
        <a routerLink="/clients" routerLinkActive="active" class="navbar-link">
          Clients
        </a>
      }
    </div>
  </div>
</nav>
